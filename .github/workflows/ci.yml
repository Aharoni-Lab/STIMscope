name: CI

# CPU-only checks that run on the GitHub Actions free tier.
# Hardware-required checks (CuPy GPU paths, real IDS Peak camera, real
# DMD over I²C, real GPIO) run on the deployment Jetson via `make test`.
#
# CI scope in this workflow:
#   • L1 (algorithms) — pure NumPy
#   • L2 (orchestration) — Qt offscreen, mocked I/O
#   • L3_hardware — mocked IDS Peak backend
#   • L3_projector — mocked I²C bus
#   • L3_5_split_first — live-trace mixins (Qt offscreen)
#   • L5_UI — Qt mixin units (Qt offscreen)
#   • infrastructure smoke + paths + logging
#   • bandit medium+ — security gate
#   • ruff — style + smell linter
#
# Out of scope here:
#   • Any GPU/CuPy-only tests — those run on the Jetson via `make test`.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

# Shared install + env defaults to keep the per-job blocks short.
# Each job below repeats the setup because GitHub Actions doesn't allow
# YAML anchors across jobs — composite actions are the alternative but
# the duplication is small enough to leave inline.

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Infrastructure smoke (paths + logging + imports). Failures here gate everything else.
  # ─────────────────────────────────────────────────────────────────────────
  test-smoke:
    name: Infrastructure smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          # PyQt5 is dragged in transitively by L2 imports.
          # Headless via QT_QPA_PLATFORM=offscreen — no X server needed.
          pip install PyQt5~=5.15

      - name: Run infrastructure smoke + paths + logging (with coverage)
        env:
          PYTHONPATH: ${{ github.workspace }}/STIMscope/STIMViewer_CRISPI/CS
          QT_QPA_PLATFORM: offscreen
        run: |
          pytest -q tests/test_infrastructure_smoke.py \
                     tests/test_paths.py \
                     tests/test_logging_config.py \
            --cov=core \
            --cov-report= --cov-append

      - name: Coverage summary
        run: |
          # Single combined coverage from --cov-append across the 3 test
          # steps above. Prints terminal summary + writes XML and HTML.
          coverage report --skip-empty
          coverage xml -o coverage.xml
          coverage html -d coverage-html

      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 30

      - name: Upload coverage HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage-html/
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────
  # L3 hardware tests with mocked IDS Peak + mocked I²C bus.
  # ─────────────────────────────────────────────────────────────────────────
  test-l3-hardware:
    name: L3 hardware (mocked)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: test-smoke  # don't run if smoke tests are red

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dev deps + Qt + runtime libs the tests import
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install PyQt5~=5.15 scikit-learn~=1.4 scikit-image~=0.24
          # opencv-python-headless covers cv2 without pulling X11; psutil
          # + pygame + pyqtgraph + tifffile + matplotlib + Pillow +
          # imagecodecs match runtime requirements.txt entries that L3+
          # tests import transitively.
          pip install opencv-python-headless~=4.8 psutil~=5.9 pygame~=2.5 \
                      pyqtgraph~=0.13 tifffile matplotlib~=3.8 \
                      Pillow imagecodecs==2025.3.30 pyzmq~=25.0

      - name: Run L3_hardware (mocked IDS Peak)
        env:
          PYTHONPATH: ${{ github.workspace }}/STIMscope/STIMViewer_CRISPI/CS
          QT_QPA_PLATFORM: offscreen
        run: pytest -q tests/L3_hardware/

      - name: Run L3_projector (mocked I²C)
        env:
          PYTHONPATH: ${{ github.workspace }}/STIMscope/STIMViewer_CRISPI/CS
          QT_QPA_PLATFORM: offscreen
        run: pytest -q tests/L3_projector/

  # ─────────────────────────────────────────────────────────────────────────
  # L3.5 (live-trace mixins) and L5 (UI mixins) — both run Qt offscreen.
  # ─────────────────────────────────────────────────────────────────────────
  test-qt-mixins:
    name: L3.5 + L5 (Qt offscreen)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: test-smoke

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: System libs Qt offscreen needs
        run: |
          sudo apt-get update -qq
          # libegl1 + libgl1 cover the OpenGL backend Qt selects under
          # the offscreen platform plugin; libxkbcommon-x11-0 covers the
          # xkbcommon plugin some Qt builds load even in offscreen mode.
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon-x11-0 libdbus-1-3

      - name: Install dev deps + Qt + runtime libs the tests import
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install PyQt5~=5.15 pyqtgraph~=0.13 \
                      scikit-learn~=1.4 scikit-image~=0.24
          # opencv-python-headless covers cv2; psutil/pygame are
          # imported by L3.5 live-trace tests via the production
          # modules they exercise.
          pip install opencv-python-headless~=4.8 psutil~=5.9 pygame~=2.5 \
                      tifffile matplotlib~=3.8 Pillow imagecodecs==2025.3.30 \
                      pyzmq~=25.0

      - name: Run L3_5_split_first (Qt offscreen)
        env:
          PYTHONPATH: ${{ github.workspace }}/STIMscope/STIMViewer_CRISPI/CS
          QT_QPA_PLATFORM: offscreen
        run: pytest -q tests/L3_5_split_first/

      - name: Run L5_UI (Qt offscreen)
        env:
          PYTHONPATH: ${{ github.workspace }}/STIMscope/STIMViewer_CRISPI/CS
          QT_QPA_PLATFORM: offscreen
        # Skip the napari-specific test file — napari is heavy + the
        # workflow is slated for removal (see docs/IMPLEMENTATION_NOTES.md
        # "Planned removals" / Napari integration).
        run: |
          pytest -q tests/L5_UI/ \
            --ignore=tests/L5_UI/test_gpu_napari.py

  # ─────────────────────────────────────────────────────────────────────────
  # Bandit + pip-audit. Gates: bandit medium+ must be zero.
  # ─────────────────────────────────────────────────────────────────────────
  security:
    name: Bandit medium+ + pip-audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install scanners
        run: |
          python -m pip install --upgrade pip
          pip install bandit~=1.7 pip-audit~=2.7

      - name: Bandit (medium+ severity must be zero)
        run: |
          bandit -r STIMscope/STIMViewer_CRISPI/ \
            --exclude '*/tests/*' \
            -ll

      - name: pip-audit (advisory only — does not gate)
        continue-on-error: true
        run: pip-audit -r requirements-dev.txt || true

  # ─────────────────────────────────────────────────────────────────────────
  # Ruff lint. Advisory until the L5 cleanup sweep finishes.
  # ─────────────────────────────────────────────────────────────────────────
  lint:
    name: Ruff lint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install ruff
        run: pip install ruff~=0.4

      - name: "Ruff (rules: E, F, B, UP, SIM; no autofix in CI)"
        continue-on-error: true
        run: |
          ruff check \
            --select E,F,B,UP,SIM \
            STIMscope/STIMViewer_CRISPI/ tests/
